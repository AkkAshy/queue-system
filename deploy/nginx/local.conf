# Local box — HTTP path-routing on the office LAN (no TLS). Used by the nginx
# container in docker-compose.local.yml. Same path layout as the host vhost, but
# proxies to compose service names instead of 127.0.0.1 ports.
map $http_upgrade $local_conn_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    # Re-resolve upstream container IPs at request time via Docker's embedded
    # DNS (127.0.0.11). Combined with variable proxy_pass below, this means a
    # recreated container (new IP — e.g. after a watchtower image update) is
    # picked up WITHOUT restarting nginx. Static `proxy_pass http://name` would
    # cache the IP at startup and 502 once the container is replaced.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Backend API
    location /api/ {
        set $up_backend backend;
        proxy_pass http://$up_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Realtime WebSocket
    location /ws/ {
        set $up_ws backend;
        proxy_pass http://$up_ws:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $local_conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
    # Admin panel (Next basePath=/admin)
    location /admin {
        set $up_admin admin;
        proxy_pass http://$up_admin:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Operator widget (basePath=/operator)
    location /operator {
        set $up_operator operator;
        proxy_pass http://$up_operator:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Display board (basePath=/tablo)
    location /tablo {
        set $up_display display;
        proxy_pass http://$up_display:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Board media — local video playlist served straight off the box (offline).
    # Drop 1+ video files into deploy/media/ on the box. Requesting /media/
    # returns a JSON file listing (autoindex) which the board turns into a
    # playlist; requesting /media/<file> streams that file.
    location /media/ {
        alias /srv/media/;
        autoindex on;
        autoindex_format json;
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
    }
    # Kiosk at root
    location / {
        set $up_kiosk kiosk;
        proxy_pass http://$up_kiosk:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
