# Local box — HTTP path-routing on the office LAN (no TLS). Used by the nginx
# container in docker-compose.local.yml. Same path layout as the host vhost, but
# proxies to compose service names instead of 127.0.0.1 ports.
map $http_upgrade $local_conn_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Realtime WebSocket
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $local_conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
    # Admin panel (Next basePath=/admin)
    location /admin {
        proxy_pass http://admin:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Operator widget (basePath=/operator)
    location /operator {
        proxy_pass http://operator:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Display board (basePath=/tablo)
    location /tablo {
        proxy_pass http://display:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Board media — local video playlist served straight off the box (offline).
    # Drop 1+ video files into deploy/media/ on the box. Requesting /media/
    # returns a JSON file listing (autoindex) which the board turns into a
    # playlist; requesting /media/<file> streams that file.
    location /media/ {
        alias /srv/media/;
        autoindex on;
        autoindex_format json;
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
    }
    # Kiosk at root
    location / {
        proxy_pass http://kiosk:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
