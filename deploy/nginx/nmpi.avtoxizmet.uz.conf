# Host-nginx vhost for the NDPI queue on a shared box (avtoxizmet.uz).
# Single host, path-routed. Drop into /etc/nginx/sites-available/ and symlink
# into sites-enabled/, then `certbot --nginx -d nmpi.avtoxizmet.uz` adds 443.
# Unique map var name to avoid clashing with other vhosts on this server.
map $http_upgrade $ndpi_conn_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name nmpi.avtoxizmet.uz;

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8210;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Realtime WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8210;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $ndpi_conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
    # Admin panel (Next basePath=/admin)
    location /admin {
        proxy_pass http://127.0.0.1:3211;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Operator widget (basePath=/operator)
    location /operator {
        proxy_pass http://127.0.0.1:3212;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Display board (basePath=/tablo)
    location /tablo {
        proxy_pass http://127.0.0.1:3213;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Kiosk at root
    location / {
        proxy_pass http://127.0.0.1:3210;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
