# Production stack for the NDPI queue cloud side. Run from repo root or deploy/:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build
# The Go printer agent is NOT here — it runs on the office mini-PC (systemd).
name: ndpi-queue

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "8000"

  kiosk:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        APP: kiosk
        NEXT_PUBLIC_USE_MSW: "0"
        NEXT_PUBLIC_WS_URL: wss://queue.${DOMAIN}
    restart: unless-stopped
    expose:
      - "3000"

  admin:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        APP: admin
        NEXT_PUBLIC_USE_MSW: "0"
        NEXT_PUBLIC_WS_URL: wss://admin.${DOMAIN}
    restart: unless-stopped
    expose:
      - "3000"

  operator:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        APP: operator
        NEXT_PUBLIC_USE_MSW: "0"
        NEXT_PUBLIC_WS_URL: wss://operator.${DOMAIN}
    restart: unless-stopped
    expose:
      - "3000"

  display:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        APP: display
        NEXT_PUBLIC_USE_MSW: "0"
        NEXT_PUBLIC_WS_URL: wss://tablo.${DOMAIN}
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [backend, kiosk, admin, operator, display]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/queue.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro

volumes:
  pgdata:
