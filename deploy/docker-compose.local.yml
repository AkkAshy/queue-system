# Local-first stack for the ON-SITE box (Phase A). Runs the whole system on one
# machine on the office LAN — works fully offline; a sync_worker mirrors the
# catalog down and pushes events up whenever the cloud is reachable.
#
#   docker compose -f deploy/docker-compose.local.yml --env-file deploy/.env.local up -d --build
#
# HTTP only (no TLS on the LAN) — path-routed by the nginx container on :80:
#   /          → kiosk        /admin → admin       /operator → operator
#   /tablo     → display      /api + /ws → backend
# Devices on the LAN open  http://<BOX_HOST>/  (BOX_HOST = the box's LAN IP).
# The Go printer agent runs on the kiosk-PC (localhost:8089), not here.
#
# NOTE: not yet tested end-to-end — needs a real box. Scaffolded ahead of time.
name: ndpi-queue-local

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "8000"

  # The sync loop: catalog cloud→local, events local→cloud, with offline backoff.
  # Reuses the backend image; overrides the entrypoint to run the worker instead
  # of daphne. The loop self-heals (catches errors + backs off) so a brief race
  # with the backend's migrate on first boot is harmless.
  sync_worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env.local
    entrypoint: ["python", "manage.py", "sync_worker"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  kiosk:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        APP: kiosk
        NEXT_PUBLIC_USE_MSW: "0"
        NEXT_PUBLIC_WS_URL: ws://${BOX_HOST}
    restart: unless-stopped
    expose:
      - "3000"

  admin:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        APP: admin
        NEXT_PUBLIC_USE_MSW: "0"
        NEXT_PUBLIC_WS_URL: ws://${BOX_HOST}
        APP_BASE_PATH: /admin
    restart: unless-stopped
    expose:
      - "3000"

  operator:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        APP: operator
        NEXT_PUBLIC_USE_MSW: "0"
        NEXT_PUBLIC_WS_URL: ws://${BOX_HOST}
        APP_BASE_PATH: /operator
    restart: unless-stopped
    expose:
      - "3000"

  display:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        APP: display
        NEXT_PUBLIC_USE_MSW: "0"
        NEXT_PUBLIC_WS_URL: ws://${BOX_HOST}
        APP_BASE_PATH: /tablo
        # Local board video served by nginx from deploy/media/ (offline-first).
        # Board plays this; falls back to the admin YouTube URL if file missing.
        NEXT_PUBLIC_BOARD_VIDEO: /media/board.mp4
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [backend, kiosk, admin, operator, display]
    ports:
      - "80:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
      # Board video file(s). Drop board.mp4 here on the box.
      - ./media:/srv/media:ro

volumes:
  pgdata_local:
