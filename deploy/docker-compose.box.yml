# On-site box stack that PULLS prebuilt images from GHCR (no build on the box).
# Images are produced by .github/workflows/build-images.yml on push to main.
# Watchtower polls GHCR and redeploys changed containers automatically — so a
# `git push` to main is all it takes to update the box, no USB flash needed.
#
# GHCR packages are PUBLIC → no docker login needed.
#   docker compose -f deploy/docker-compose.box.yml --env-file deploy/.env.local pull
#   docker compose -f deploy/docker-compose.box.yml --env-file deploy/.env.local up -d
#
# Reuses the SAME deploy/.env.local that the build-on-box stack uses — one env
# file, already filled on the box. (Frontend images are prebuilt, so its values
# are only used at runtime by the backend; changing BOX_HOST needs no rebuild.)
#
# HTTP only (LAN), path-routed by the nginx container on :80 — same as local.
# Owner is lowercased for GHCR: AkkAshy → akkashy.

name: ndpi-queue-box

x-watch: &watch
  labels:
    com.centurylinklabs.watchtower.enable: "true"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_box:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    <<: *watch
    image: ghcr.io/akkashy/ndpi-backend:latest
    restart: unless-stopped
    env_file: .env.local
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
    expose: ["8000"]

  sync_worker:
    <<: *watch
    image: ghcr.io/akkashy/ndpi-backend:latest
    restart: unless-stopped
    env_file: .env.local
    entrypoint: ["python", "manage.py", "sync_worker"]
    depends_on:
      db: { condition: service_healthy }
      backend: { condition: service_started }

  kiosk:
    <<: *watch
    image: ghcr.io/akkashy/ndpi-kiosk:latest
    restart: unless-stopped
    expose: ["3000"]

  admin:
    <<: *watch
    image: ghcr.io/akkashy/ndpi-admin:latest
    restart: unless-stopped
    expose: ["3000"]

  operator:
    <<: *watch
    image: ghcr.io/akkashy/ndpi-operator:latest
    restart: unless-stopped
    expose: ["3000"]

  display:
    <<: *watch
    image: ghcr.io/akkashy/ndpi-display:latest
    restart: unless-stopped
    expose: ["3000"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [backend, kiosk, admin, operator, display]
    ports:
      - "80:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/srv/media:ro

  # Auto-updater: every 2 min checks GHCR for new :latest of the labelled
  # containers and redeploys them (only services with the watchtower label —
  # db/redis/nginx are left alone). GHCR packages are public, so no registry
  # creds are needed (no docker config mount → clean on Windows too).
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    environment:
      # The watchtower image ships an old Docker API client (1.25); modern
      # Docker daemons require >= 1.40. Pin a supported version so its calls
      # aren't rejected (otherwise it crash-loops on every poll).
      DOCKER_API_VERSION: "1.41"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 120 --cleanup --label-enable

volumes:
  pgdata_box:
